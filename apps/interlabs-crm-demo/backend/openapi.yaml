        - $ref: '#/components/parameters/SearchParam'
        - { in: query, name: current_pr_status, schema: { type: string, enum: [Registered, Processed] } }
      responses:
        '200':
          description: Paginated PRs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/PurchaseRequisition' }

  /api/finance/purchase-requisitions/{id}:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    get:
      tags: [Finance]
      summary: Get PR
      x-rbac: { feature: purchase_requisition, capability: view_own, allowed_roles: [superadmin, ceo, finance, sales], scope: own }
      responses:
        '200':
          description: PR
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/PurchaseRequisition' }
    put:
      tags: [Finance]
      summary: Update PR metadata
      x-rbac: { feature: purchase_requisition, capability: edit, allowed_roles: [superadmin, ceo, finance], scope: own }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PurchaseRequisitionUpdateRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/PurchaseRequisition' }
    delete:
      tags: [Finance]
      summary: Soft-delete PR
      x-rbac: { feature: purchase_requisition, capability: delete, allowed_roles: [superadmin, ceo], scope: global }
      responses:
        '204': { description: Deleted }

  /api/finance/purchase-requisitions/{id}/upload-po-out:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    put:
      tags: [Finance]
      summary: Upload PO Out → advances PO to Production
      description: |
        Requires po_out_number + po_out_date + at least one PO Out file.
        Sets PR.current_pr_status=Processed, advances master PO to Production,
        fires finance.pr.processed and finance.po.production.
      x-rbac: { feature: purchase_requisition, capability: write, allowed_roles: [superadmin, ceo, finance], scope: own }
      x-po-side-effects:
        status_transition: { to: Production }
        notification_templates: [finance.pr.processed, finance.po.production]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PRUploadPOOutRequest' }
      responses:
        '200':
          description: PO Out recorded + PO transitioned to Production
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          purchase_requisition: { $ref: '#/components/schemas/PurchaseRequisition' }
                          purchase_order: { $ref: '#/components/schemas/PurchaseOrder' }
        '409': { $ref: '#/components/responses/Conflict' }

