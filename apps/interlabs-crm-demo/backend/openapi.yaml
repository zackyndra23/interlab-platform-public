  # ====================================================================
  # HRGA — Smart Search (role-gated document categories)
  # ====================================================================
  /api/hrga/search:
    get:
      tags: [HRGA]
      summary: Smart Search across legal documents, letters, and archive
      description: |
        Full-text + metadata filtered search. Results are filtered per the
        caller's role against hrga_legal_documents.access_scope and
        company_letters.access_scope. HRGA sees all; other roles only
        documents explicitly scoped to their role (or all_roles).
      x-rbac: { feature: hrga_legal, capability: view_own, allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance], scope: role-scoped }
      parameters:
        - { in: query, name: keyword, schema: { type: string } }
        - { in: query, name: document_category, schema: { type: string } }
        - { in: query, name: document_subcategory, schema: { type: string } }
        - { in: query, name: document_number, schema: { type: string } }
        - { in: query, name: year, schema: { type: integer } }
        - { in: query, name: issue_date_from, schema: { type: string, format: date } }
        - { in: query, name: issue_date_to, schema: { type: string, format: date } }
        - { in: query, name: expiry_date_from, schema: { type: string, format: date } }
        - { in: query, name: expiry_date_to, schema: { type: string, format: date } }
        - { in: query, name: pic_user_id, schema: { type: string, format: uuid } }
        - { in: query, name: related_employee_id, schema: { type: string, format: uuid } }
        - { in: query, name: related_customer_id, schema: { type: string, format: uuid } }
        - { in: query, name: notary_name, schema: { type: string } }
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: tags, schema: { type: array, items: { type: string } }, style: form, explode: true }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Unified search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/HRGASearchResultItem' }

