openapi: 3.0.3
info:
  title: Interlab Portal API
  version: 1.0.0
  description: |
    Internal Enterprise Dashboard — CRM + ERP + Realtime Operations Hub for
    PT. Interlab Sentra Solutions Indonesia.

    Covers: Auth, Users & Roles, PO lifecycle (11 stages across 5 divisions),
    Sales, Admin & Log, Finance, Technical, HRGA/Legal, Tax & Insurance,
    Notifications, Chat, Email Templates, Files.

    ## Response envelope
    Every response uses a consistent envelope:
      success: `{ "success": true,  "data": ..., "meta"?: {...} }`
      error:   `{ "success": false, "error": "message", "code"?: "..." }`

    ## RBAC
    Every protected endpoint declares `x-rbac` with the feature_key,
    capability, allowed role_keys, and row-level scope. The RBAC middleware
    enforces `(feature, capability)` against `role_permissions` on every
    request; `scope` is applied to queries via the sameRoleScope /
    row-level-security layer.

    ## PO lifecycle side-effects
    Endpoints marked `x-po-side-effects` MUST, in a single transaction:
      1. Append to `purchase_order_status_history`
      2. Append to `purchase_order_tracking_events`
      3. Update `purchase_orders.current_status`
      4. Emit the declared notification templates (if enabled)
  contact:
    name: Interlab Portal Engineering
    email: zakyindrasatriaputra@gmail.com

servers:
  - url: https://api.interlab-portal.com
    description: Production
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Auth
    description: Login, logout, refresh, current-user
  - name: Users
    description: User CRUD (role-scoped)
  - name: Roles
    description: Role definitions and permission matrix
  - name: PO Tracking
    description: Global PO search and lifecycle history (shared across all roles)
  - name: Sales
    description: Sales forms — forecast, quotation, HPP, PO, PR, customers
  - name: Admin & Log
    description: AWB, Delivery Order, operational petty cash
  - name: Finance
    description: PO Customer, PR, Invoice Manufacture, Invoice Customer
  - name: Technical
    description: Job Order, Installation, PM, Sparepart, QC, BAST
  - name: HRGA
    description: Smart Search, Legalitas, Company Letters, Archive
  - name: Tax & Insurance
    description: Tax Operational records (SSP, SPT, PPh 21/25, PPN)
  - name: Notifications
    description: Notification bell + full page
  - name: Chat
    description: Channels, messages, reads
  - name: Email Templates
    description: Notification template enable/disable
  - name: Files
    description: MinIO file upload / presigned URLs

security:
  - bearerAuth: []

paths:

  # ====================================================================
  # Auth
  # ====================================================================
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Email + password login (reCAPTCHA v2 required)
      security: []
      description: |
        Rate limited to 5 attempts per IP per 15 minutes and per email.
        reCAPTCHA v2 token is verified server-side before password check.
        Returns access_token (1h) + refresh_token (7d, or 30d with remember_me).
      x-rate-limit: 5-per-15min-per-ip-and-email
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/LoginResponseData' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate current refresh token
      responses:
        '204': { description: Logged out }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange refresh token for new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshTokenRequest' }
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/RefreshTokenResponseData' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ====================================================================
  # Users  (same-role-scoped for non-Superadmin/CEO)
  # ====================================================================
  /api/users:
    get:
      tags: [Users]
      summary: List users
      x-rbac:
        feature: roles_management
        capability: view_own
        allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance]
        scope: same-role-or-global
        note: Superadmin/CEO see all; other roles see only users whose role matches their managed_role_scope
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - { in: query, name: role, schema: { $ref: '#/components/schemas/RoleKey' } }
        - { in: query, name: account_status, schema: { type: string, enum: [active, inactive, suspended] } }
      responses:
        '200':
          description: Paginated users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Users]
      summary: Create user
      x-rbac:
        feature: roles_management
        capability: create
        allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance]
        scope: same-role-or-global
        note: Same-role managers may only create users with matching role_key
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserCreateRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/users/{id}:
    parameters:
      - $ref: '#/components/parameters/UUIDPathId'
    get:
      tags: [Users]
      summary: Get user by id
      x-rbac:
        feature: roles_management
        capability: view_own
        allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance]
        scope: same-role-or-global
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Users]
      summary: Update user
      x-rbac:
        feature: roles_management
        capability: edit
        allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance]
        scope: same-role-or-global
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserUpdateRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Users]
      summary: Soft-delete user
      x-rbac:
        feature: roles_management
        capability: delete
        allowed_roles: [superadmin, ceo]
        scope: global
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ====================================================================
  # Roles & Permissions
  # ====================================================================
  /api/roles:
    get:
      tags: [Roles]
      summary: List roles
      x-rbac:
        feature: roles_management
        capability: view_own
        allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance]
        scope: same-role-or-global
      responses:
        '200':
          description: Roles
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Role' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Roles]
      summary: Create custom role
      x-rbac:
        feature: roles_management
        capability: create
        allowed_roles: [superadmin, ceo]
        scope: global
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoleCreateRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Role' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/roles/{id}:
    parameters:
      - $ref: '#/components/parameters/UUIDPathId'
    put:
      tags: [Roles]
      summary: Update role
      x-rbac:
        feature: roles_management
        capability: edit
        allowed_roles: [superadmin, ceo]
        scope: global
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoleCreateRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Role' }

  /api/roles/{id}/permissions:
    parameters:
      - $ref: '#/components/parameters/UUIDPathId'
    put:
      tags: [Roles]
      summary: Replace role's permission matrix
      x-rbac:
        feature: roles_management
        capability: edit
        allowed_roles: [superadmin, ceo]
        scope: global
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RolePermissionsUpdateRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }

  /api/permissions/features:
    get:
      tags: [Roles]
      summary: List feature + capability registry (for permission matrix UI)
      x-rbac:
        feature: roles_management
        capability: view_own
        allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance]
        scope: same-role-or-global
      responses:
        '200':
          description: Features and capabilities
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          features:
                            type: array
                            items: { $ref: '#/components/schemas/FeatureDefinition' }
                          capabilities:
                            type: array
                            items: { $ref: '#/components/schemas/CapabilityDefinition' }

  # ====================================================================
  # PO Tracking  (shared, visible to all authenticated roles, role-scoped)
  # ====================================================================
  /api/po-tracking/search:
    get:
      tags: [PO Tracking]
      summary: Search PO by po_number
      x-rbac:
        feature: po_tracking
        capability: view_own
        allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance]
        scope: role-scoped
      parameters:
        - { in: query, name: po_number, required: true, schema: { type: string } }
      responses:
        '200':
          description: PO with latest 3 history entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/POSearchResult' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/po-tracking/{id}/history:
    parameters:
      - $ref: '#/components/parameters/UUIDPathId'
    get:
      tags: [PO Tracking]
      summary: Full PO stage-transition history
      x-rbac:
        feature: po_tracking
        capability: view_own
        allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance]
        scope: role-scoped
      responses:
        '200':
          description: History entries (oldest -> newest)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/POStatusHistoryEntry' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/po-tracking/{id}/latest:
    parameters:
      - $ref: '#/components/parameters/UUIDPathId'
    get:
      tags: [PO Tracking]
      summary: Latest PO status + 3 most recent history entries
      x-rbac:
        feature: po_tracking
        capability: view_own
        allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance]
        scope: role-scoped
      responses:
        '200':
          description: Latest snapshot
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/POSearchResult' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ====================================================================
  # Sales — Customers
  # ====================================================================
  /api/sales/customers:
    get:
      tags: [Sales]
      summary: List customers
      x-rbac:
        feature: customers
        capability: view_own
        allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical]
        scope: global
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/SortParam'
        - { in: query, name: customer_status, schema: { type: string, enum: [Active, Inactive] } }
      responses:
        '200':
          description: Paginated customers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Customer' }
    post:
      tags: [Sales]
      summary: Create customer
      x-rbac:
        feature: customers
        capability: create
        allowed_roles: [superadmin, ceo, sales]
        scope: own
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerCreateRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Customer' }
        '400': { $ref: '#/components/responses/ValidationError' }

  /api/sales/customers/{id}:
    parameters:
      - $ref: '#/components/parameters/UUIDPathId'
    get:
      tags: [Sales]
      summary: Get customer by id
      x-rbac: { feature: customers, capability: view_own, allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical], scope: global }
      responses:
        '200':
          description: Customer
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Customer' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Sales]
      summary: Update customer
      x-rbac: { feature: customers, capability: edit, allowed_roles: [superadmin, ceo, sales], scope: own }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerUpdateRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Customer' }
    delete:
      tags: [Sales]
      summary: Soft-delete customer
      x-rbac: { feature: customers, capability: delete, allowed_roles: [superadmin, ceo, sales], scope: own }
      responses:
        '204': { description: Deleted }

  # ====================================================================
  # Sales — Forecasts
  # ====================================================================
  /api/sales/forecasts:
    get:
      tags: [Sales]
      summary: List sales forecasts
      x-rbac: { feature: sales_forecast, capability: view_own, allowed_roles: [superadmin, ceo, sales], scope: own }
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - { in: query, name: stage, schema: { type: string, enum: [Prospect, Qualified, Proposal, Negotiation, Won, Lost] } }
        - { in: query, name: workflow_status, schema: { type: string, enum: [draft, submitted, closed] } }
        - { in: query, name: step_status, schema: { $ref: '#/components/schemas/StepStatus' } }
        - { in: query, name: customer_id, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Paginated forecasts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SalesForecast' }
    post:
      tags: [Sales]
      summary: Create sales forecast
      x-rbac: { feature: sales_forecast, capability: create, allowed_roles: [superadmin, ceo, sales], scope: own }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SalesForecastCreateRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/SalesForecast' }

  /api/sales/forecasts/{id}:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    get:
      tags: [Sales]
      summary: Get forecast
      x-rbac: { feature: sales_forecast, capability: view_own, allowed_roles: [superadmin, ceo, sales], scope: own }
      responses:
        '200':
          description: Forecast
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/SalesForecast' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Sales]
      summary: Update forecast
      x-rbac: { feature: sales_forecast, capability: edit, allowed_roles: [superadmin, ceo, sales], scope: own }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SalesForecastCreateRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/SalesForecast' }
    delete:
      tags: [Sales]
      summary: Soft-delete forecast
      x-rbac: { feature: sales_forecast, capability: delete, allowed_roles: [superadmin, ceo, sales], scope: own }
      responses:
        '204': { description: Deleted }

  # ====================================================================
  # Sales — Quotations
  # ====================================================================
  /api/sales/quotations:
    get:
      tags: [Sales]
      summary: List quotations
      x-rbac: { feature: quotation, capability: view_own, allowed_roles: [superadmin, ceo, sales, finance], scope: own }
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - { in: query, name: workflow_status, schema: { type: string, enum: [draft, submitted, revised, accepted, rejected] } }
        - { in: query, name: customer_id, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Paginated quotations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Quotation' }
    post:
      tags: [Sales]
      summary: Create quotation
      x-rbac: { feature: quotation, capability: create, allowed_roles: [superadmin, ceo, sales], scope: own }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuotationCreateRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Quotation' }

  /api/sales/quotations/{id}:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    get:
      tags: [Sales]
      summary: Get quotation
      x-rbac: { feature: quotation, capability: view_own, allowed_roles: [superadmin, ceo, sales, finance], scope: own }
      responses:
        '200':
          description: Quotation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Quotation' }
    put:
      tags: [Sales]
      summary: Update quotation
      x-rbac: { feature: quotation, capability: edit, allowed_roles: [superadmin, ceo, sales], scope: own }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuotationCreateRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/Quotation' }
    delete:
      tags: [Sales]
      summary: Soft-delete quotation
      x-rbac: { feature: quotation, capability: delete, allowed_roles: [superadmin, ceo, sales], scope: own }
      responses:
        '204': { description: Deleted }

  # ====================================================================
  # Sales — Harga Pokok Penjualan
  # ====================================================================
  /api/sales/harga-pokok-penjualan:
    get:
      tags: [Sales]
      summary: List HPP records
      x-rbac: { feature: hpp, capability: view_own, allowed_roles: [superadmin, ceo, sales], scope: own }
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
      responses:
        '200':
          description: Paginated HPP
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/HargaPokokPenjualan' }
    post:
