    get:
      tags: [Notifications]
      summary: Full paginated notifications page
      x-rbac: { feature: notifications, capability: view_own, allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance], scope: own }
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - { in: query, name: unread, schema: { type: boolean } }
        - { in: query, name: related_module, schema: { type: string } }
      responses:
        '200':
          description: Paginated notifications
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Notification' }

  /api/notifications/{id}/read:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    put:
      tags: [Notifications]
      summary: Mark notification as read
      x-rbac: { feature: notifications, capability: edit, allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance], scope: own }
      responses:
        '200':
          description: Marked as read
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }

  /api/notifications/read-all:
    put:
      tags: [Notifications]
      summary: Mark all notifications as read for current user
      x-rbac: { feature: notifications, capability: edit, allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance], scope: own }
      responses:
        '200':
          description: All marked as read
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          marked_count: { type: integer }

  /api/notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Get unread count (for bell badge)
      x-rbac: { feature: notifications, capability: view_own, allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance], scope: own }
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          unread_count: { type: integer }

  # ====================================================================
  # Chat
  # ====================================================================
  /api/chat/channels:
    get:
      tags: [Chat]
      summary: List current user's chat channels
      x-rbac: { feature: chat, capability: view_own, allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance], scope: own }
      responses:
        '200':
          description: Channels the user is a member of
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/ChatChannel' }
    post:
      tags: [Chat]
      summary: Create channel (DM, group, role, or topic)
      x-rbac: { feature: chat, capability: create, allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance], scope: own }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChatChannelCreateRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/ChatChannel' }

  /api/chat/channels/{id}/messages:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    get:
      tags: [Chat]
      summary: List messages in a channel
      x-rbac: { feature: chat, capability: view_own, allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance], scope: own }
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - { in: query, name: before_message_id, schema: { type: string, format: uuid }, description: Paginate messages created before this message_id }
        - { in: query, name: topic_id, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Messages (newest -> oldest unless sort overridden)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/ChatMessage' }
    post:
      tags: [Chat]
      summary: Send a message (also broadcast via WebSocket chat:message)
      x-rbac: { feature: chat, capability: write, allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance], scope: own }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChatMessageCreateRequest' }
      responses:
        '201':
          description: Sent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/ChatMessage' }

  /api/chat/messages/{id}/read:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    put:
      tags: [Chat]
      summary: Mark this message (and earlier in channel) as read
      x-rbac: { feature: chat, capability: edit, allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance], scope: own }
      responses:
        '200':
          description: Marked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }

  # ====================================================================
  # Email Templates (Setup)
  # ====================================================================
  /api/email-templates:
    get:
      tags: [Email Templates]
      summary: List notification templates (optionally filtered by group)
      x-rbac: { feature: email_templates, capability: view_own, allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance], scope: same-role-or-global }
      parameters:
        - { in: query, name: feature_group, schema: { type: string } }
        - { in: query, name: status, schema: { type: string, enum: [enabled, disabled] } }
      responses:
        '200':
          description: Templates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/NotificationTemplate' }

  /api/email-templates/{id}:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    put:
      tags: [Email Templates]
      summary: Update template (subject, body, recipients, channel toggles)
      x-rbac: { feature: email_templates, capability: edit, allowed_roles: [superadmin, ceo], scope: global }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationTemplateUpdateRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/NotificationTemplate' }

  /api/email-templates/{id}/enable:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    put:
      tags: [Email Templates]
      summary: Enable a single template
      x-rbac: { feature: email_templates, capability: edit, allowed_roles: [superadmin, ceo], scope: global }
      responses:
        '200':
          description: Enabled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/NotificationTemplate' }

  /api/email-templates/{id}/disable:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    put:
      tags: [Email Templates]
      summary: Disable a single template (suppresses all delivery for its trigger_event)
      x-rbac: { feature: email_templates, capability: edit, allowed_roles: [superadmin, ceo], scope: global }
      responses:
        '200':
          description: Disabled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/NotificationTemplate' }

  /api/email-templates/group/{group}/enable-all:
    parameters:
      - { in: path, name: group, required: true, schema: { type: string } }
    put:
      tags: [Email Templates]
      summary: Bulk-enable every template in a feature_group
      x-rbac: { feature: email_templates, capability: edit, allowed_roles: [superadmin, ceo], scope: global }
      responses:
        '200':
          description: Updated count
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          updated_count: { type: integer }

  /api/email-templates/group/{group}/disable-all:
    parameters:
      - { in: path, name: group, required: true, schema: { type: string } }
    put:
      tags: [Email Templates]
      summary: Bulk-disable every template in a feature_group
      x-rbac: { feature: email_templates, capability: edit, allowed_roles: [superadmin, ceo], scope: global }
      responses:
        '200':
          description: Updated count
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          updated_count: { type: integer }

  # ====================================================================
  # Files (MinIO)
  # ====================================================================
  /api/files/upload:
    post:
      tags: [Files]
      summary: Upload a file to MinIO
      description: |
        Accepts multipart/form-data. Supported extensions:
        pdf, doc, docx, xls, xlsx, csv, jpg, jpeg, png, webp, zip.
        Server assigns file_id and stores metadata in file_attachments.
      x-rbac: { feature: user_profile, capability: write, allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance], scope: own }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, related_module]
              properties:
                file:
                  type: string
                  format: binary
                related_module:
                  type: string
                  enum: [sales, admin-log, finance, technical, hrga, tax, po-tracking, avatars]
                related_entity_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: File stored + metadata row created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/FileAttachment' }
        '413': { description: File too large }

  /api/files/{id}/presigned-url:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    get:
      tags: [Files]
      summary: Get 15-minute presigned download URL
      x-rbac: { feature: user_profile, capability: view_own, allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance], scope: own }
      responses:
        '200':
          description: Presigned URL
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/FilePresignedUrl' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/files/{id}:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    delete:
      tags: [Files]
      summary: Soft-delete file (removes MinIO object + marks deleted_at)
      x-rbac: { feature: user_profile, capability: delete, allowed_roles: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance], scope: own }
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT access token (1h expiry). Obtained from `POST /api/auth/login`.
        Refresh with `POST /api/auth/refresh` (refresh token 7d, or 30d with remember_me).

  parameters:
    PageParam:
      in: query
      name: page
      required: false
      schema: { type: integer, minimum: 1, default: 1 }
    LimitParam:
      in: query
      name: limit
      required: false
      schema: { type: integer, enum: [25, 50, 75, 100], default: 25 }
    SearchParam:
      in: query
      name: search
      required: false
      schema: { type: string }
    SortParam:
      in: query
      name: sort
      required: false
      description: "Column to sort by (e.g. 'created_at'). Prefix '-' for DESC."
      schema: { type: string }
    UUIDPathId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Forbidden:
      description: RBAC denied (role lacks feature.capability, or out-of-scope record)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: Resource not found (or soft-deleted)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    ValidationError:
      description: Request body / params failed validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Conflict:
      description: Conflict with current state (e.g. duplicate unique key, invalid stage transition)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    RateLimited:
      description: Too many requests (login rate limit, etc.)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  schemas:

    # ------------------------------------------------------------------
    # Envelopes & pagination
    # ------------------------------------------------------------------
    SuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true] }
        data: {}
        meta: { $ref: '#/components/schemas/PaginationMeta' }
    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success: { type: boolean, enum: [false] }
        error: { type: string }
        code: { type: string }
        field_errors:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }
    PaginationMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        total_pages: { type: integer }

    # ------------------------------------------------------------------
    # Enums
    # ------------------------------------------------------------------
    RoleKey:
      type: string
      enum: [superadmin, ceo, sales, admin_log, finance, technical, hrga, tax_insurance]
    POStatus:
      type: string
      enum: [Registered, Processed, Production, Shipped, Customs, Arrived, Inspected, Delivery, Installation, BAST, Invoice]
    POStatusCode:
      type: string
      enum: [REGISTERED, PROCESSED, PRODUCTION, SHIPPED, CUSTOMS, ARRIVED, INSPECTED, DELIVERY, INSTALLATION, BAST, INVOICE]
    Currency:
      type: string
      enum: [IDR, USD, EUR]
    StepStatus:
      type: string
      enum: [on_track, overdue]
    YesNo:
      type: string
      enum: [Yes, No]
    AccessScope:
      type: string
      enum: [hrga_only, all_roles, specific_roles]

    # ------------------------------------------------------------------
    # Common primitives
    # ------------------------------------------------------------------
    LineItem:
      type: object
      properties:
        item_name: { type: string }
        description: { type: string, nullable: true }
        qty: { type: number }
        unit: { type: string, nullable: true }
        unit_price: { type: number }
        total_price: { type: number }
        cost_price: { type: number, nullable: true }
        selling_price: { type: number, nullable: true }
        margin_amount: { type: number, nullable: true }
        margin_percent: { type: number, nullable: true }
      additionalProperties: true
    UserSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        display_name: { type: string }
        email: { type: string, format: email }
        role: { $ref: '#/components/schemas/RoleKey' }
        avatar_url: { type: string, nullable: true }
    AuditFields:
      type: object
      properties:
        created_at: { type: string, format: date-time, readOnly: true }
        updated_at: { type: string, format: date-time, readOnly: true }
        created_by: { type: string, format: uuid, nullable: true, readOnly: true }
        updated_by: { type: string, format: uuid, nullable: true, readOnly: true }
        deleted_at: { type: string, format: date-time, nullable: true, readOnly: true }
    SLAFields:
      type: object
      properties:
        workflow_status: { type: string }
        current_step: { type: string, nullable: true }
        step_due_at: { type: string, format: date-time, nullable: true }
        step_status: { $ref: '#/components/schemas/StepStatus' }
        last_progress_at: { type: string, format: date-time, nullable: true }

    # ------------------------------------------------------------------
    # Auth
    # ------------------------------------------------------------------
    LoginRequest:
      type: object
      required: [email, password, recaptcha_token]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        recaptcha_token:
          type: string
          description: reCAPTCHA v2 token, verified server-side
        remember_me:
          type: boolean
          default: false
          description: Extends refresh-token expiry to 30 days
    LoginResponseData:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer, description: Seconds until access token expiry }
        user: { $ref: '#/components/schemas/User' }
    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    RefreshTokenResponseData:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer }

    # ------------------------------------------------------------------
    # User
    # ------------------------------------------------------------------
    User:
      type: object
      required: [id, email, role, display_name, account_status]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        role: { $ref: '#/components/schemas/RoleKey' }
        permission_level: { type: string, nullable: true }
        avatar_url: { type: string, nullable: true }
        display_name: { type: string }
        account_status:
          type: string
          enum: [active, inactive, suspended]
        managed_role_scope: { type: string, nullable: true }
        can_manage_same_role: { type: boolean }
        feature_permission_scope: { type: string, nullable: true }
        created_at: { type: string, format: date-time, readOnly: true }
        updated_at: { type: string, format: date-time, readOnly: true }
    UserCreateRequest:
      type: object
      required: [email, password, role, display_name]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        role: { $ref: '#/components/schemas/RoleKey' }
        display_name: { type: string }
        permission_level: { type: string }
        avatar_file_id: { type: string, format: uuid, nullable: true }
        account_status:
          type: string
          enum: [active, inactive, suspended]
          default: active
        managed_role_scope: { type: string }
        can_manage_same_role: { type: boolean, default: false }
        feature_permission_scope: { type: string }
    UserUpdateRequest:
      type: object
      properties:
        email: { type: string, format: email }
        display_name: { type: string }
        permission_level: { type: string }
        avatar_file_id: { type: string, format: uuid, nullable: true }
        account_status:
          type: string
          enum: [active, inactive, suspended]
        password: { type: string, format: password, minLength: 8 }
        managed_role_scope: { type: string }
        can_manage_same_role: { type: boolean }
        feature_permission_scope: { type: string }

    # ------------------------------------------------------------------
    # Role + permissions
    # ------------------------------------------------------------------
    Role:
      type: object
      properties:
        id: { type: string, format: uuid }
        role_name: { type: string }
        role_key: { type: string }
        is_system_role: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    RoleCreateRequest:
      type: object
      required: [role_name, role_key]
      properties:
        role_name: { type: string }
        role_key:
          type: string
          pattern: '^[a-z][a-z0-9_]*$'
    FeatureDefinition:
      type: object
      properties:
        id: { type: string, format: uuid }
        feature_key: { type: string }
        feature_name: { type: string }
        module_group: { type: string }
    CapabilityDefinition:
      type: object
      properties:
        id: { type: string, format: uuid }
        capability_key:
          type: string
          enum: [view_own, view_global, create, edit, delete, write, export, approve, full_access]
        capability_name: { type: string }
    RolePermissionsUpdateRequest:
      type: object
      required: [permissions]
      properties:
        permissions:
          type: array
          items:
            type: object
            required: [feature_key, capability_key]
            properties:
              feature_key: { type: string }
              capability_key: { type: string }

    # ------------------------------------------------------------------
    # Purchase Order (master lifecycle) + history + events
    # ------------------------------------------------------------------
    PurchaseOrder:
      type: object
      properties:
        id: { type: string, format: uuid }
        po_number: { type: string }
        current_status: { $ref: '#/components/schemas/POStatus' }
        created_by_user_id: { type: string, format: uuid, nullable: true }
        created_by_role: { type: string, nullable: true }
        updated_by_user_id: { type: string, format: uuid, nullable: true }
        updated_by_role: { type: string, nullable: true }
        customer_id: { type: string, format: uuid, nullable: true }
        due_at: { type: string, format: date-time, nullable: true }
        overdue_at: { type: string, format: date-time, nullable: true }
        overdue_reason: { type: string, nullable: true }
        overdue_attachment_id: { type: string, format: uuid, nullable: true }
        escalation_sent_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    POStatusHistoryEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        po_id: { type: string, format: uuid }
        po_number: { type: string }
        status_code: { $ref: '#/components/schemas/POStatusCode' }
        status_label: { type: string }
        updated_by_user_id: { type: string, format: uuid, nullable: true }
        updated_by_role: { type: string, nullable: true }
        note: { type: string, nullable: true }
        reason_if_delayed: { type: string, nullable: true }
        attachment_url: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
    POTrackingEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        po_id: { type: string, format: uuid }
        event_type: { type: string }
        payload_json: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
    POSearchResult:
      type: object
      description: Role-scoped PO search result — includes latest 3 history entries
      properties:
        po: { $ref: '#/components/schemas/PurchaseOrder' }
        latest_history:
          type: array
          maxItems: 3
          items: { $ref: '#/components/schemas/POStatusHistoryEntry' }
    POOverdueReasonRequest:
      type: object
      required: [overdue_reason]
      properties:
        overdue_reason: { type: string }
        overdue_attachment_id: { type: string, format: uuid, nullable: true }

    # ------------------------------------------------------------------
    # Customer
    # ------------------------------------------------------------------
    Customer:
      allOf:
        - $ref: '#/components/schemas/AuditFields'
        - type: object
          properties:
            id: { type: string, format: uuid, readOnly: true }
            customer_record_number: { type: string, readOnly: true }
            company_name: { type: string }
