  /api/sales/purchase-orders/{id}/submit:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    post:
      tags: [Sales]
      summary: Submit Sales PO (kicks off PO lifecycle at Registered)
      description: |
        Transitions Sales PO from draft to submitted. Creates master
        purchase_orders row with current_status=Registered, appends to
        purchase_order_status_history + purchase_order_tracking_events,
        sets sla_tracking.due_at = now + 2 working days, and fires the
        sales.po.registered notification template (recipients:
        sales, admin_log, finance).
      x-rbac: { feature: sales_po, capability: write, allowed_roles: [superadmin, ceo, sales], scope: own }
      x-po-side-effects:
        status_transition: { to: Registered }
        notification_templates: [sales.po.registered]
      responses:
        '200':
          description: Submitted — PO lifecycle started
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: object
                        properties:
                          sales_po: { $ref: '#/components/schemas/SalesPurchaseOrder' }
                          purchase_order: { $ref: '#/components/schemas/PurchaseOrder' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/sales/purchase-orders/{id}/overdue-reason:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    post:
      tags: [Sales]
      summary: Justify overdue Sales PO stage
      description: |
        Required when Sales PO step_status=overdue. Records overdue_reason
        (and optional attachment), fires sales.po.delay_justified
        notification to Superadmin, CEO, Admin & Log, Finance.
      x-rbac: { feature: sales_po, capability: edit, allowed_roles: [superadmin, ceo, sales], scope: own }
      x-po-side-effects:
        notification_templates: [sales.po.delay_justified]
      requestBody:
