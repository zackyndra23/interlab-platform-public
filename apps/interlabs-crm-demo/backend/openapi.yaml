  # ====================================================================
  # Technical — Installations
  # ====================================================================
  /api/technical/installations:
    get:
      tags: [Technical]
      summary: List installations
      x-rbac: { feature: installation, capability: view_own, allowed_roles: [superadmin, ceo, technical, admin_log, finance], scope: own }
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - { in: query, name: workflow_phase, schema: { type: string, enum: [pre_installation, workshop, ready_to_deliver, scheduling, on_site, commissioning, completed] } }
        - { in: query, name: admin_log_response_status, schema: { type: string, enum: [pending, acknowledged, dispatched] } }
      responses:
        '200':
          description: Paginated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/InstallationRecord' }
    post:
      tags: [Technical]
      summary: Create installation record
      description: |
        Side effects on specific field writes:
          - inspection_status=Complete + function_test_status=Pass → PO: Inspected
          - installation_start_date set                            → PO: Installation
          - ready_to_deliver=Yes                                    → admin_log reminder SLA starts
          - bast_upload_file_ids provided                           → PO: BAST + Invoice Customer draft
      x-rbac: { feature: installation, capability: create, allowed_roles: [superadmin, ceo, technical], scope: own }
      x-po-side-effects:
        notification_templates: [technical.po.inspected, technical.po.installation, technical.installation.ready_to_deliver, technical.bast.submitted, finance.invoice_customer.registered]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InstallationCreateRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/InstallationRecord' }

  /api/technical/installations/{id}:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    get:
      tags: [Technical]
      summary: Get installation
      x-rbac: { feature: installation, capability: view_own, allowed_roles: [superadmin, ceo, technical, admin_log, finance], scope: own }
      responses:
        '200':
          description: Installation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/InstallationRecord' }
    put:
      tags: [Technical]
      summary: Update installation (field-trigger PO updates)
      x-rbac: { feature: installation, capability: edit, allowed_roles: [superadmin, ceo, technical], scope: own }
      x-po-side-effects:
        notification_templates: [technical.po.inspected, technical.po.installation, technical.installation.ready_to_deliver, technical.bast.submitted, finance.invoice_customer.registered]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InstallationCreateRequest' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - properties:
                      data: { $ref: '#/components/schemas/InstallationRecord' }
    delete:
      tags: [Technical]
      summary: Soft-delete
      x-rbac: { feature: installation, capability: delete, allowed_roles: [superadmin, ceo, technical], scope: own }
      responses:
        '204': { description: Deleted }

  /api/technical/installations/{id}/ready-to-deliver:
    parameters: [ { $ref: '#/components/parameters/UUIDPathId' } ]
    put:
      tags: [Technical]
      summary: Mark installation Ready-to-Deliver (starts 2-day Admin & Log SLA)
      description: |
        Sets ready_to_deliver=Yes, ready_to_deliver_at=now(),
        admin_log_response_status=pending. Fires
        technical.installation.ready_to_deliver. SLA monitor job will
        escalate after 2 working days of no admin_log response.
      x-rbac: { feature: installation, capability: write, allowed_roles: [superadmin, ceo, technical], scope: own }
      x-po-side-effects:
        notification_templates: [technical.installation.ready_to_deliver]
      requestBody:
        required: true
        content:
