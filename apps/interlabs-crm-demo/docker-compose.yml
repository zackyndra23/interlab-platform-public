# Consolidated production compose — interlabs-crm-demo (Phase 1.6, Approach A / A2-Direct).
# Data stack stays at /home/zaky/data-stack (see data-stack-reference/). DB pw externalized
# to ${DATABASE_URL} (from .env) so no plaintext secret is committed.
# Deploy: cd apps/interlabs-crm-demo && docker compose up -d --build

# Demo deployment stack for the Interlabs CRM.
#
# Piggybacks on infrastructure already running on this VPS:
#   - interlab-postgres  (network: interlab-data-net)
#   - interlab-redis     (network: interlab-data-net)
#   - interlab-minio     (network: interlab-data-net)
#   - traefik            (network: traefik_default) — routes
#     app.interlab-portal.com / api.interlab-portal.com by Host header.
#
# Backend joins both networks; frontend only needs traefik_default.

services:
  interlab-api:
    build:
      context: ./backend
    image: interlab-api:demo
    container_name: interlab-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      TZ: Asia/Jakarta
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      # Per-role seed passwords (cutover) — consumed once by scripts/seed.js, then hashed.
      SEED_PW_SUPERADMIN: ${SEED_PW_SUPERADMIN:-}
      SEED_PW_CEO: ${SEED_PW_CEO:-}
      SEED_PW_SALES: ${SEED_PW_SALES:-}
      SEED_PW_ADMINLOG: ${SEED_PW_ADMINLOG:-}
      SEED_PW_FINANCE: ${SEED_PW_FINANCE:-}
      SEED_PW_TECHNICAL: ${SEED_PW_TECHNICAL:-}
      SEED_PW_HRGA: ${SEED_PW_HRGA:-}
      SEED_PW_TAX: ${SEED_PW_TAX:-}
      JWT_SECRET: ${JWT_SECRET:-demo-access-jwt-change-me-0123456789abcdef}
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-demo-refresh-jwt-change-me-fedcba9876543210}
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: "10"
      RECAPTCHA_SECRET: ${RECAPTCHA_SECRET:-}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      TWO_FACTOR_ENCRYPTION_KEY: ${TWO_FACTOR_ENCRYPTION_KEY:-}
      APP_BASE_URL: ${APP_BASE_URL:-https://app.interlab-portal.com}
      CORS_ORIGIN: https://app.interlab-portal.com
      FRONTEND_URL: https://app.interlab-portal.com
      SCHEDULER_ENABLED: "true"
      SCHEDULER_TIMEZONE: Asia/Jakarta
      LOG_LEVEL: info
      LOGIN_RATE_LIMIT_MAX: "30"
      LOGIN_RATE_LIMIT_WINDOW_MS: "300000"
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://s3-storage.interlab-portal.com}
      MINIO_BUCKET: ${MINIO_BUCKET:-interlab-storage}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-interlab-storage}
      S3_REGION: ${S3_REGION:-us-east-1}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-Demo@22April2026!}
      # SMTP / outbound email — pass-through from repo-root .env so the
      # email dispatch worker can deliver password-reset, 2FA OTP, and
      # invitation emails. env.js accepts both SMTP_PASSWORD and SMTP_PASS,
      # and both SMTP_FROM_* and EMAIL_FROM_* pairs.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Interlab Portal}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
    networks:
      - interlab-data-net
      - interlab-global
      - traefik_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_default"
      # Shared HTTP→HTTPS redirect middleware (per-service so we don't have
      # to modify the platform traefik compose).
      - "traefik.http.middlewares.interlab-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.interlab-redirect.redirectscheme.permanent=true"
      # :80 — 301 redirect everything to :443
      - "traefik.http.routers.interlab-api.rule=Host(`api.interlab-portal.com`)"
      - "traefik.http.routers.interlab-api.entrypoints=web"
      - "traefik.http.routers.interlab-api.middlewares=interlab-redirect"
      # :443 — TLS-terminated router with Let's Encrypt via the existing
      # ACME resolver configured on the Traefik container (`myresolver`).
      - "traefik.http.routers.interlab-api-secure.rule=Host(`api.interlab-portal.com`)"
      - "traefik.http.routers.interlab-api-secure.entrypoints=websecure"
      - "traefik.http.routers.interlab-api-secure.tls=true"
      - "traefik.http.routers.interlab-api-secure.tls.certresolver=myresolver"
      - "traefik.http.routers.interlab-api-secure.service=interlab-api"
      - "traefik.http.services.interlab-api.loadbalancer.server.port=4000"

  interlab-app:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://api.interlab-portal.com
        NEXT_PUBLIC_WS_URL: wss://api.interlab-portal.com/api/ws
        NEXT_PUBLIC_APP_NAME: Interlabs CRM
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-}
    image: interlab-app:demo
    container_name: interlab-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      TZ: Asia/Jakarta
    depends_on:
      - interlab-api
    networks:
      - traefik_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_default"
      # :80 — 301 redirect everything to :443 (reuses the interlab-redirect
      # middleware declared on the api service; Traefik merges labels per
      # provider so either service declaring it is fine).
      - "traefik.http.routers.interlab-app.rule=Host(`app.interlab-portal.com`)"
      - "traefik.http.routers.interlab-app.entrypoints=web"
      - "traefik.http.routers.interlab-app.middlewares=interlab-redirect"
      # :443 — TLS-terminated router with Let's Encrypt.
      - "traefik.http.routers.interlab-app-secure.rule=Host(`app.interlab-portal.com`)"
      - "traefik.http.routers.interlab-app-secure.entrypoints=websecure"
      - "traefik.http.routers.interlab-app-secure.tls=true"
      - "traefik.http.routers.interlab-app-secure.tls.certresolver=myresolver"
      - "traefik.http.routers.interlab-app-secure.service=interlab-app"
      - "traefik.http.services.interlab-app.loadbalancer.server.port=3000"

networks:
  interlab-data-net:
    external: true
  interlab-global:
    external: true
  traefik_default:
    external: true
